<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Watch and download movies on GlassWave.">
    <title>Watch Movie — GlassWave</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ad banner block */
        .ad-banner-block {
            width: 100%;
            margin-top: 20px;
            text-align: center;
            overflow: hidden;
        }
        .ad-banner-block > div { max-width: 100%; margin: 0 auto; }
        @media (max-width: 600px) { .ad-banner-block { margin-top: 14px; } }

        /* ── Animated gradient buttons ── */
        @keyframes tgShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .tg-animated {
            background-size: 200% 200%;
            animation: tgShift 3s ease infinite;
            border: none !important;
            color: #fff !important;
            font-weight: 700;
            letter-spacing: 0.03em;
            transition: transform 0.18s, box-shadow 0.18s;
        }
        .tg-animated:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 28px rgba(0,0,0,0.35);
        }
        .tg-animated:active { transform: scale(0.97); }

        /* 1080P — blue-purple */
        .tg-1080 {
            background-image: linear-gradient(270deg, #6366f1, #8b5cf6, #4f46e5, #7c3aed);
        }
        /* 720P — teal-green */
        .tg-720 {
            background-image: linear-gradient(270deg, #0ea5e9, #06b6d4, #10b981, #0284c7);
        }
        /* Subtitle — orange-pink */
        .tg-sub {
            background-image: linear-gradient(270deg, #f97316, #ec4899, #ef4444, #f59e0b);
        }

        /* Clicked state */
        .tg-animated.clicked {
            animation: tgShift 1.5s ease infinite;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="logo" onclick="window.location.href='index.html'">
            Cine<span>Wave</span>
        </div>

        <a href="index.html" style="
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 7px 14px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            transition: all 0.3s;
        "
        onmouseover="this.style.color='var(--accent)'; this.style.borderColor='var(--accent)';"
        onmouseout="this.style.color='var(--text-muted)'; this.style.borderColor='var(--glass-border)';">
            <i class="fas fa-home"></i> Home
        </a>
    </header>

    <!-- ===== DETAILS CONTENT ===== -->
    <div id="detailsContainer">
        <!-- Loading spinner while JS populates -->
        <div class="loader-wrapper" style="min-height: 60vh;">
            <div class="loader"></div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>© 2026 <span>GlassWave</span>. All rights reserved. For entertainment purposes only.</p>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', loadMovieDetails);
    </script>

</body>
</html>
